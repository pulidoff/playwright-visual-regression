name: Playwright Visual Regression

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run visual regression tests
        id: run_tests
        run: npx playwright test
        continue-on-error: true

      - name: Generate missing Linux baselines
        if: steps.run_tests.outcome == 'failure'
        run: npx playwright test --update-snapshots || true

      - name: Commit and push new Linux baselines
        if: steps.run_tests.outcome == 'failure' && github.event_name == 'push'
        id: push_baselines
        run: |
          # Restore any modified tracked snapshots to avoid overwriting baselines
          # that differ due to a real regression (only untracked = genuinely new files)
          git checkout -- snapshots/ 2>/dev/null || true
          NEW=$(git ls-files --others --exclude-standard snapshots/)
          if [ -z "$NEW" ]; then
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$NEW" | xargs git add
          git commit -m "ci: auto-generate Linux baselines [skip ci]"
          git push
          echo "committed=true" >> $GITHUB_OUTPUT

      - name: Re-run tests after baseline generation
        if: steps.push_baselines.outputs.committed == 'true'
        run: npx playwright test

      - name: Fail if tests failed without generating new baselines
        if: steps.run_tests.outcome == 'failure' && steps.push_baselines.outputs.committed != 'true'
        run: |
          echo "::error::Tests failed. Either there are visual regressions, or Linux baselines are missing on a pull request. Push to main to trigger auto-generation, or run 'npx playwright test --update-snapshots' locally and commit the Linux snapshots."
          exit 1

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
