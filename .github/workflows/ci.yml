name: Playwright Visual Regression

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run visual regression tests
        id: run_tests
        run: npx playwright test
        continue-on-error: true

      - name: Generate and push missing baselines
        if: steps.run_tests.outcome == 'failure'
        run: |
          npx playwright test --update-snapshots || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if ! git diff --staged --quiet; then
            git commit -m "ci: auto-generate Linux baselines [skip ci]"
            git push
          fi

      - name: Re-run visual regression tests
        if: steps.run_tests.outcome == 'failure'
        run: npx playwright test

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
